services:
  # MCP Server with auto-restart on code changes
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickup-mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - DATABASE_URL=${DATABASE_URL:-}
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4/}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CLICKUP_TEAM_ID=${CLICKUP_TEAM_ID:-}
      - REPORTS_DIR=/app/reports
    volumes:
      - ./clickup_mcp:/app/clickup_mcp
      - ./app:/app/app
      - ./monitoring_config.json:/app/monitoring_config.json
      - ./project_map.json:/app/project_map.json
      - reports:/app/reports
    develop:
      watch:
        - path: ./clickup_mcp
          action: rebuild
        - path: ./app
          action: rebuild
        - path: ./monitoring_config.json
          action: rebuild
        - path: ./project_map.json
          action: rebuild
        - path: ./requirements.txt
          action: rebuild
        - path: ./Dockerfile
          action: rebuild
    networks:
      - clickup-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -m 3 -o /dev/null http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # API Server - REST endpoint for browser queries
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickup-api-server
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - AI_CLIENT_PROVIDER=${AI_CLIENT_PROVIDER:-openrouter}
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4/}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen-2.5-7b-instruct}
      - OPENROUTER_MODEL_CHAIN=${OPENROUTER_MODEL_CHAIN:-}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-}
      - OPENROUTER_APP_TITLE=${OPENROUTER_APP_TITLE:-ClickUp MCP}
      - OPENROUTER_ENABLE_ZAI_FALLBACK=${OPENROUTER_ENABLE_ZAI_FALLBACK:-true}
      - OPENROUTER_ZAI_FALLBACK_MODELS=${OPENROUTER_ZAI_FALLBACK_MODELS:-glm-4.7-flash,glm-4.5-flash}
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - REPORTS_DIR=/app/reports
    volumes:
      - ./api_server.py:/app/api_server.py
      - ./zai_client.py:/app/zai_client.py
      - ./openrouter_client.py:/app/openrouter_client.py
      - ./zai_system_prompt.md:/app/zai_system_prompt.md
      - ./openrouter_system_prompt.md:/app/openrouter_system_prompt.md
      - ./lm_studio_system_prompt.md:/app/lm_studio_system_prompt.md
      - ./clickup_mcp:/app/clickup_mcp
      - ./app:/app/app
      - reports:/app/reports
    networks:
      - clickup-net
    depends_on:
      mcp-server:
        condition: service_healthy
    command: python api_server.py
    develop:
      watch:
        - path: ./api_server.py
          action: rebuild
        - path: ./zai_client.py
          action: rebuild
        - path: ./openrouter_client.py
          action: rebuild
        - path: ./zai_system_prompt.md
          action: rebuild
        - path: ./openrouter_system_prompt.md
          action: rebuild
        - path: ./lm_studio_system_prompt.md
          action: rebuild
        - path: ./requirements.txt
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  # AI Client (Z.AI / OpenRouter) - runs interactively
  ai-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickup-ai-client
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      - AI_CLIENT_PROVIDER=${AI_CLIENT_PROVIDER:-openrouter}
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4/}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen-2.5-7b-instruct}
      - OPENROUTER_MODEL_CHAIN=${OPENROUTER_MODEL_CHAIN:-}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-}
      - OPENROUTER_APP_TITLE=${OPENROUTER_APP_TITLE:-ClickUp MCP}
      - OPENROUTER_ENABLE_ZAI_FALLBACK=${OPENROUTER_ENABLE_ZAI_FALLBACK:-true}
      - OPENROUTER_ZAI_FALLBACK_MODELS=${OPENROUTER_ZAI_FALLBACK_MODELS:-glm-4.7-flash,glm-4.5-flash}
      - REPORTS_DIR=/app/reports
    volumes:
      - ./zai_client.py:/app/zai_client.py
      - ./openrouter_client.py:/app/openrouter_client.py
      - ./zai_system_prompt.md:/app/zai_system_prompt.md
      - ./openrouter_system_prompt.md:/app/openrouter_system_prompt.md
      - ./clickup_mcp:/app/clickup_mcp
      - ./app:/app/app
      - reports:/app/reports
    networks:
      - clickup-net
    depends_on:
      mcp-server:
        condition: service_healthy
    command: sh -c "sleep 5 && python -m clickup_mcp.client"
    develop:
      watch:
        - path: ./zai_client.py
          action: rebuild
        - path: ./openrouter_client.py
          action: rebuild
        - path: ./zai_system_prompt.md
          action: rebuild
        - path: ./openrouter_system_prompt.md
          action: rebuild
        - path: ./lm_studio_system_prompt.md
          action: rebuild
        - path: ./clickup_mcp
          action: rebuild
        - path: ./requirements.txt
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

volumes:
  reports:
    driver: local

networks:
  clickup-net:
    driver: bridge
